name: Application Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'catalog/**'
      - 'isbn/**'

env:
  IMAGE_NAME: catalog

jobs:
  test-and-build:
    name: Test and Build
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Run tests and package
        run: mvn -B test package

      - name: Save JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: catalog/target/catalog-*.jar
          retention-days: 1

      - name: Generate image tag
        id: meta
        run: echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

  push-to-acr:
    name: Push to ACR
    runs-on: ubuntu-latest
    needs: test-and-build
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: catalog/target

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name ${{ vars.ACR_NAME }}

      - name: Docker build and push
        env:
          IMAGE_TAG: ${{ needs.test-and-build.outputs.image-tag }}
        run: |
          IMAGE_URI=${{ vars.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}
          docker build -f catalog/Dockerfile -t "${IMAGE_URI}:${IMAGE_TAG}" -t "${IMAGE_URI}:latest" .
          docker push "${IMAGE_URI}:${IMAGE_TAG}"
          docker push "${IMAGE_URI}:latest"

  deploy-to-container-app:
    name: Deploy to Container App
    runs-on: ubuntu-latest
    needs:
      - test-and-build
      - push-to-acr
    permissions:
      id-token: write
      contents: read
    environment: production
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update Container App image
        env:
          IMAGE_TAG: ${{ needs.test-and-build.outputs.image-tag }}
        run: |
          az containerapp update \
            --name ${{ vars.CONTAINER_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --image ${{ vars.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}
